events {}

http {
    upstream ingestor {
        server sensor-ingestion:3030;
    }

    server {
        listen 3030;

        # The live SSE stream is long-lived, so it needs the 1s read timeout lifted
        # and buffering off to flush events immediately. This does not touch the
        # ingest path below, which keeps its 1s limit.
        location /api/stream {
            proxy_pass http://ingestor;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
        }

        # Production gateway constraint: requests that take too long are cut.
        # Ingest should answer well under a second; a slow handler returns 504s under load.
        location / {
            proxy_pass http://ingestor;
            proxy_connect_timeout 1s;
            proxy_send_timeout 1s;
            proxy_read_timeout 1s;
        }
    }
}
