events {}

http {
    # Re-resolve the ingestor's DNS per request so traffic spreads across all
    # replicas. Docker returns one A record per replica; a static upstream block
    # resolves once at startup and would pin every request to a single pod.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Rate limits: reject with 429 at the edge, before a request costs the app an
    # event-loop tick. The ingest limit is a coarse runaway-client valve (the whole
    # simulated fleet shares one IP), complementing the app's queue-depth 503.
    limit_req_zone  $binary_remote_addr zone=ingest:10m  rate=200r/s;
    limit_req_zone  $binary_remote_addr zone=readapi:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=streams:10m;
    limit_req_status 429;
    limit_conn_status 429;

    server {
        listen 3030;
        client_max_body_size 8k;

        # The live SSE stream is long-lived: lift the 1s read timeout and disable
        # buffering so events flush immediately. The ingest path keeps its 1s limit.
        location /api/stream {
            limit_conn streams 10;
            set $ingestor http://sensor-ingestion:3030;
            proxy_pass $ingestor$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
        }

        location /ingest {
            limit_req zone=ingest burst=100 nodelay;
            set $ingestor http://sensor-ingestion:3030;
            proxy_pass $ingestor$request_uri;
            proxy_connect_timeout 1s;
            proxy_send_timeout 1s;
            proxy_read_timeout 1s;
        }

        # Production gateway constraint: requests that take too long are cut.
        # A slow handler returns 504s under load rather than hanging.
        location / {
            limit_req zone=readapi burst=20 nodelay;
            set $ingestor http://sensor-ingestion:3030;
            proxy_pass $ingestor$request_uri;
            proxy_connect_timeout 1s;
            proxy_send_timeout 1s;
            proxy_read_timeout 1s;
        }
    }
}
