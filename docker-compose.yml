x-clickhouse-env: &clickhouse-env
  CLICKHOUSE_USER: ${CLICKHOUSE_USER}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./server/clickhouse/init:/docker-entrypoint-initdb.d
    environment: *clickhouse-env
    networks:
      - app_network
    # clickhouse-client, not wget: it ships in the image and authenticates
    # reliably, whereas wget returns 403 against ClickHouse's auth challenge.
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "${CLICKHOUSE_USER}", "--password", "${CLICKHOUSE_PASSWORD}", "--query", "SELECT 1"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 10s

  device:
    build:
      context: ./server/device
      dockerfile: Dockerfile
    environment:
      - TARGET_URL=http://gateway:3030/ingest
      # Default load is gentle. Bump these to simulate production volume,
      # e.g. DEVICE_COUNT=50 docker compose up
      - DEVICE_COUNT=${DEVICE_COUNT:-3}
      - INTERVAL_MS=${INTERVAL_MS:-500}
    networks:
      - app_network
    depends_on:
      - gateway
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  sensor-ingestion:
    build:
      context: ./server/ingestor
      dockerfile: Dockerfile
    container_name: sensor-ingestion
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - app_network
    environment:
      <<: *clickhouse-env
      CLICKHOUSE_URL: http://clickhouse:8123
      ALLOWED_ORIGIN: http://localhost:5173
    # Production runs this in small, CPU-limited pods. Keep that in mind.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"

  # Rolling-deploy agent: keeps the fleet services on the current build.
  deployer:
    image: docker:cli
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - sensor-ingestion
    command: sh -c "while true; do sleep 30; docker restart sensor-ingestion >/dev/null 2>&1 || true; done"

  gateway:
    build:
      context: ./server/gateway
      dockerfile: Dockerfile
    ports:
      - "3030:3030"
    depends_on:
      sensor-ingestion:
        condition: service_healthy
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "128M"

  react-app:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - gateway
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "128M"

networks:
  app_network:
    driver: bridge

volumes:
  clickhouse_data:
